name: Run Code Check

on: [push]

jobs:
  check-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Must match composer.lock (Laravel 13 + Symfony 8 require PHP >= 8.4)
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          coverage: none

      - name: Install dependencies
        run: composer install

      - name: Run Duster
        run: composer check-code